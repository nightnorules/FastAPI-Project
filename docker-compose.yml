x-python-service: &python-service
  build: .
  restart: unless-stopped
  env_file:
    - .env.docker.example
  volumes:
    - ./backend:/app/backend
  networks:
    - fastapi-network

services:
  db:
    image: postgres:15-alpine
    container_name: fastapi_shop_db
    restart: unless-stopped
    env_file:
      - .env.example
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shop_user -d shop_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fastapi-network

  app:
    <<: *python-service
    container_name: fastapi_shop_app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: gunicorn --workers 2 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000 --access-logfile - --error-logfile - backend.app.main:app
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  nginx:
    image: nginx:latest
    container_name: fastapi_shop_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - fastapi-network

  prometheus:
    image: prom/prometheus:latest
    container_name: fastapi_shop_prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9090:9090"
    networks:
      - fastapi-network

  grafana:
    image: grafana/grafana:latest
    container_name: fastapi_shop_grafana
    restart: unless-stopped
    env_file:
      - .env.example
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - fastapi-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: fastapi_shop_pgadmin
    restart: unless-stopped
    env_file:
      - .env.example
    ports:
      - "5050:80"
    depends_on:
      - db
    networks:
      - fastapi-network

  redis:
    image: redis:7-alpine
    container_name: fastapi_shop_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - fastapi-network

  celery_worker:
    <<: *python-service
    container_name: fastapi_shop_celery_worker
    command: celery -A backend.app.core.celery_app:celery_app worker --loglevel=info --concurrency=2
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      app:
        condition: service_healthy

  celery_beat:
    <<: *python-service
    container_name: fastapi_shop_celery_beat
    command: celery -A backend.app.core.celery_app:celery_app beat --loglevel=info
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
  redis_data:

networks:
  fastapi-network:
    driver: bridge
